.price-btn.outline{background:transparent;color:var(–accent);border:1px solid var(–border)}
.price-btn.outline:hover{border-color:var(–accent)}
.price-note{font-family:var(–ff-mono);font-size:10px;color:#bbb;margin-top:16px}

// ─── STATE ──────────────────────────────────────────────────────────
let lang='de', tab=0;

function setLang(l){lang=l;tab=0;render();}
function setTab(i){tab=i;renderLegal();}
function scrollTo(id){document.getElementById(id)?.scrollIntoView({behavior:'smooth'});}

// ─── NAV SCROLL ─────────────────────────────────────────────────────
window.addEventListener('scroll',()=>{
  document.getElementById('navbar').classList.toggle('scrolled',window.scrollY>40);
});

// ─── RENDER ─────────────────────────────────────────────────────────
function render(){
  const t=DATA[lang];
  document.documentElement.lang=lang;

  // Lang buttons
  ['de','en','fr'].forEach(l=>{
    const b=document.getElementById('lb-'+l);
    b.classList.toggle('active',lang===l);
  });

  // Hero
  document.getElementById('hero-sub').textContent=t.hero_sub;
  document.getElementById('hero-lines').innerHTML=t.hero_l1+'<br>'+t.hero_l2+'<br>'+t.hero_l3+' <strong>SNOB</strong>.';
  document.getElementById('hero-cta').textContent=t.call;
  document.getElementById('hero-tap').textContent=t.tap;

  // Services
  document.getElementById('svc-title').textContent=t.svc_t;
  document.getElementById('svc-sub').textContent=t.svc_s;
  let sg='';
  t.svcs.forEach(s=>{
    sg+=`<div class="svc-card"><div class="svc-icon">${s.i}</div><h3>${s.t}</h3><p>${s.d}</p></div>`;
  });
  document.getElementById('svc-grid').innerHTML=sg;

  // Pricing
  document.getElementById('price-title').innerHTML=t.pr_t;
  let pg='';
  t.plans.forEach(p=>{
    const pop=p.pop?'pop':'';
    const amt=p.p
      ?`<span class="price-num ${pop?'pop':''}">${p.p}</span><span class="price-unit">${t.pm}</span>`
      :`<span class="price-ask">${t.pa}</span>`;
    let feats='';
    p.f.forEach(f=>{feats+=`<div class="price-feat"><span class="price-dot">●</span>${f}</div>`;});
    pg+=`<div class="price-card ${pop}">
      <div class="price-name">${p.n}</div>
      <div class="price-amt">${amt}</div>
      <div class="price-features">${feats}</div>
      <a href="tel:0041615391399" class="price-btn ${pop?'fill':'outline'}">${t.pr_cta}</a>
    </div>`;
  });
  document.getElementById('price-grid').innerHTML=pg;
  document.getElementById('price-note').textContent=t.pr_x;

  // Legal
  document.getElementById('legal-title').textContent=t.leg_t;
  document.getElementById('legal-sub').textContent=t.leg_s;
  document.getElementById('legal-date').textContent=t.leg_d;

  // Tabs
  let tb='';
  t.tabs.forEach((label,i)=>{
    tb+=`<button class="tab-btn ${tab===i?'active':''}" onclick="setTab(${i})">${label}</button>`;
  });
  document.getElementById('tabs').innerHTML=tb;

  // Downloads
  let dl='';
  t.dl.forEach((label,i)=>{
    dl+=`<button class="dl-btn" onclick="download(${i})">${label}</button>`;
  });
  document.getElementById('dl-row').innerHTML=dl;

  // CTA
  document.getElementById('cta-title').innerHTML=t.cta1+'<br>'+t.cta2+'<br>'+t.cta3;
  document.getElementById('cta-sub').textContent=t.cta_s;

  // Impressum
  document.getElementById('imp-label').textContent=t.imp;

  // Footer
  let fl='';
  [t.tabs[1],t.tabs[0],t.imp].forEach(l=>{
    fl+=`<span class="footer-link" onclick="scrollTo('legal')">${l}</span>`;
  });
  document.getElementById('footer-links').innerHTML=fl;
  document.getElementById('footer-copy').innerHTML=t.fc+'<br>'+t.ff+'<br>'+t.fd;

  renderLegal();
}

function renderLegal(){
  const t=DATA[lang];
  const sets=[t.agb,t.priv,t.dpa];
  const items=sets[tab]||[];

  // Update tab active state
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',i===tab);
  });

  let html='';
  items.forEach((item,i)=>{
    html+=`<div class="acc-item">
      <button class="acc-btn" onclick="toggleAcc(${i})">
        <span class="acc-title">${item.t}</span>
        <span class="acc-icon" id="acc-icon-${i}">+</span>
      </button>
      <div class="acc-body" id="acc-body-${i}"><p>${item.c}</p></div>
    </div>`;
  });
  document.getElementById('acc-container').innerHTML=html;
}

function toggleAcc(i){
  const body=document.getElementById('acc-body-'+i);
  const icon=document.getElementById('acc-icon-'+i);
  const isOpen=body.classList.contains('open');

  // Close all
  document.querySelectorAll('.acc-body').forEach(b=>b.classList.remove('open'));
  document.querySelectorAll('.acc-icon').forEach(ic=>ic.classList.remove('open'));

  if(!isOpen){
    body.classList.add('open');
    icon.classList.add('open');
  }
}

function download(i){
  const t=DATA[lang];
  const sets=[t.agb,t.priv,t.dpa];
  const title=t.tabs[i];
  const items=sets[i];
  let txt=title+'\ngoSNOB.ai · Basel\nApril 2026\n'+'═'.repeat(40)+'\n\n';
  items.forEach(s=>{txt+=s.t+'\n'+s.c+'\n\n';});
  txt+='\ngoSNOB.ai · Swiss Law · Basel\nTimothy Jordi & Jan Mironiuk\nprivacy@gosnob.ai\n';
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain;charset=utf-8'}));
  a.download='goSNOB_'+title.replace(/[^a-zA-Z0-9]/g,'_')+'_2026.txt';
  a.click();
}

// INIT
render();
</script>
