html{scroll-behavior:smooth}
body{background:var(--wh);color:var(--bk);font-family:var(--fs);-webkit-font-smoothing:antialiased}
::selection{background:var(--a);color:#fff}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
a{text-decoration:none;color:inherit}
button{font-family:inherit}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:999;transition:all .3s;padding:0 24px}
.nav.sc{background:rgba(255,255,255,.97);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(–bd)}
.nav-in{max-width:1080px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;height:56px}
.logo{font-family:var(–fm);font-size:14px;letter-spacing:4px;cursor:pointer;white-space:nowrap}
.logo .hl{color:var(–a)}
.nav-r{display:flex;align-items:center;gap:4px}
.lb{background:none;border:none;cursor:pointer;font-family:var(–fm);font-size:11px;letter-spacing:1px;color:#bbb;padding:4px 5px;transition:color .2s}
.lb.on{color:var(–bk);font-weight:600}
.ldv{width:1px;height:12px;background:#ddd}

/* HERO */
.hero{padding:140px 24px 80px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:’’;position:absolute;top:-120px;right:-120px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(176,68,224,.06)0%,transparent 70%);pointer-events:none}
.hero-badge{display:inline-block;font-family:var(–fm);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(–a);border:1px solid var(–a);padding:6px 16px;margin-bottom:32px;border-radius:20px}
.hero h1{font-size:clamp(36px,6vw,56px);font-weight:700;letter-spacing:-1px;line-height:1.1;margin-bottom:16px}
.hero h1 .hl{color:var(–a)}
.hero-sub{font-size:16px;color:var(–g3);max-width:520px;margin:0 auto;line-height:1.6}

/* SECTION NAV */
.sec-nav{max-width:1080px;margin:0 auto;padding:0 24px}
.sec-nav-in{display:flex;gap:0;border-bottom:1px solid var(–bd);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.sec-nav-in::-webkit-scrollbar{display:none}
.sn-btn{padding:16px 24px;background:none;border:none;font-family:var(–fm);font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;color:var(–g3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;white-space:nowrap}
.sn-btn.on{color:var(–a);border-bottom-color:var(–a);font-weight:600}
@media(max-width:600px){.sn-btn{padding:14px 16px;font-size:10px}}

/* CONTENT AREA */
.content{max-width:1080px;margin:0 auto;padding:48px 24px 80px}

/* ACCORDION */
.acc{border-top:1px solid var(–bd)}
.acc-i{border-bottom:1px solid var(–bd)}
.acc-h{width:100%;display:flex;justify-content:space-between;align-items:center;padding:20px 0;background:none;border:none;cursor:pointer;text-align:left}
.acc-t{font-size:15px;font-weight:600;color:var(–bk);padding-right:16px}
.acc-x{color:var(–a);font-size:24px;font-weight:300;transition:transform .3s;flex-shrink:0;line-height:1}
.acc-x.open{transform:rotate(45deg)}
.acc-b{max-height:0;overflow:hidden;transition:max-height .4s ease}
.acc-b.open{max-height:600px}
.acc-b p{font-size:14px;color:var(–g5);line-height:1.85;padding-bottom:20px}

/* DOWNLOAD CENTER */
.dl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.dl-card{background:var(–g1);border:1px solid var(–bd);border-radius:8px;padding:24px;transition:all .2s;cursor:pointer;position:relative;overflow:hidden}
.dl-card:hover{border-color:var(–a);background:var(–a-bg)}
.dl-card::after{content:‘↓’;position:absolute;top:20px;right:20px;font-size:18px;color:var(–a);opacity:0;transition:opacity .2s}
.dl-card:hover::after{opacity:1}
.dl-tag{font-family:var(–fm);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(–a);margin-bottom:10px;font-weight:600}
.dl-name{font-size:15px;font-weight:600;color:var(–bk);margin-bottom:6px}
.dl-desc{font-size:12px;color:var(–g3);line-height:1.5}
.dl-fmt{font-family:var(–fm);font-size:10px;color:var(–g3);margin-top:10px;letter-spacing:1px}

/* CATEGORY HEADER */
.cat-head{margin-bottom:24px;margin-top:48px}
.cat-head:first-child{margin-top:0}
.cat-label{font-family:var(–fm);font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(–a);font-weight:600;margin-bottom:8px}
.cat-desc{font-size:13px;color:var(–g3)}
.cat-bar{width:24px;height:2px;background:var(–a);margin-top:12px;margin-bottom:24px}

/* FOOTER */
.foot{max-width:1080px;margin:0 auto;padding:40px 24px 56px;border-top:1px solid var(–bd);text-align:center}
.foot-logo{font-family:var(–fm);font-size:13px;letter-spacing:4px;margin-bottom:20px}
.foot-logo .hl{color:var(–a)}
.foot-links{display:flex;justify-content:center;gap:24px;margin-bottom:20px;flex-wrap:wrap}
.foot-link{font-family:var(–fm);font-size:10px;color:var(–g3);letter-spacing:1px;cursor:pointer;text-transform:uppercase;text-decoration:underline;text-underline-offset:3px}
.foot-copy{font-family:var(–fm);font-size:10px;color:#bbb;line-height:2.2}

/* RESPONSIVE */
@media(max-width:600px){
.hero{padding:120px 16px 60px}
.hero h1{font-size:32px}
.hero-sub{font-size:14px}
.content{padding:32px 16px 60px}

.foot{padding:32px 16px 48px}
.acc-t{font-size:14px}
.nav-in{height:50px}
.logo{font-size:12px;letter-spacing:3px}
}

// ─── STATE ──────────────────────────────────────────────────────────
let lang='de',sec=0;
function L(l){lang=l;sec=0;R();}
function S(i){sec=i;RC();}

// ─── SCROLL NAV ─────────────────────────────────────────────────────
window.addEventListener('scroll',()=>document.getElementById('nav').classList.toggle('sc',scrollY>40));

}

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">

</svg>`;
}

function dlFile(i){
  const t=I[lang];
  const item=t.dl_items[i];
  let content='',fn='';
  if(i===0){content=genDoc(t.agb,t.snav[0]);fn='goSNOB_'+t.snav[0].replace(/[^a-zA-Z0-9]/g,'_')+'_2026.txt';}
  else if(i===1){content=genDoc(t.priv,t.snav[1]);fn='goSNOB_'+t.snav[1].replace(/[^a-zA-Z0-9]/g,'_')+'_2026.txt';}
  else if(i===2){content=genDoc(t.dpa,t.snav[2]);fn='goSNOB_'+t.snav[2].replace(/[^a-zA-Z0-9]/g,'_')+'_2026.txt';}
  else if(i===3){content=genSVG('#000','Basel');fn='SNOB_Logo_Black.svg';}
  else if(i===4){content=genSVG('#fff','Basel');fn='SNOB_Logo_White.svg';}
  else if(i===5){content=genSVG('#b044e0','Basel');fn='SNOB_Logo_Purple.svg';}
  else if(i===6){content=genCI();fn='goSNOB_CI_Guide.txt';}
  else if(i===7){content=genImpressum();fn='goSNOB_Impressum.txt';}
  const mime=fn.endsWith('.svg')?'image/svg+xml':'text/plain';
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type:mime+';charset=utf-8'}));
  a.download=fn;a.click();
}

// ─── RENDER ─────────────────────────────────────────────────────────
function R(){
  const t=I[lang];
  document.documentElement.lang=lang;
  ['de','en','fr'].forEach(l=>document.getElementById('lb-'+l).classList.toggle('on',lang===l));

  document.getElementById('h-badge').textContent=t.badge;
  document.getElementById('h-title').innerHTML=t.title;
  document.getElementById('h-sub').textContent=t.sub;

  let sn='';
  t.snav.forEach((label,i)=>{sn+=`<button class="sn-btn ${sec===i?'on':''}" onclick="S(${i})">${label}</button>`;});
  document.getElementById('sec-nav').innerHTML=sn;

  let fl='';
  t.fl.forEach(l=>{fl+=`<span class="foot-link" onclick="S(0)">${l}</span>`;});
  document.getElementById('f-links').innerHTML=fl;
  document.getElementById('f-copy').innerHTML=t.fc+'<br>'+t.ff+'<br>'+t.fd;

  RC();
}

function RC(){
  const t=I[lang];
  // Update nav active
  document.querySelectorAll('.sn-btn').forEach((b,i)=>b.classList.toggle('on',i===sec));

  const c=document.getElementById('content');
  if(sec===3){
    // DOWNLOAD CENTER
    const cats=[
      {l:t.dl_cat_legal,d:t.dl_cat_legal_d},
      {l:t.dl_cat_ci,d:t.dl_cat_ci_d},
      {l:t.dl_cat_info,d:t.dl_cat_info_d}
    ];
    let h='';
    cats.forEach((cat,ci)=>{
      h+=`<div class="cat-head${ci===0?' first':''}"><div class="cat-label">${cat.l}</div><div class="cat-desc">${cat.d}</div><div class="cat-bar"></div></div>`;
      h+='<div class="dl-grid">';
      t.dl_items.forEach((item,ii)=>{
        if(item.cat===ci){
          h+=`<div class="dl-card" onclick="dlFile(${ii})"><div class="dl-tag">${item.tag}</div><div class="dl-name">${item.name}</div><div class="dl-desc">${item.desc}</div><div class="dl-fmt">${item.fmt}</div></div>`;
        }
      });
      h+='</div>';
    });
    c.innerHTML=h;
  } else {
    // LEGAL ACCORDION
    const sets=[t.agb,t.priv,t.dpa];
    const items=sets[sec]||[];
    let h='<div class="acc">';
    items.forEach((item,i)=>{
      h+=`<div class="acc-i"><button class="acc-h" onclick="toggleA(${i})"><span class="acc-t">${item.t}</span><span class="acc-x" id="ax${i}">+</span></button><div class="acc-b" id="ab${i}"><p>${item.c}</p></div></div>`;
    });
    h+='</div>';
    c.innerHTML=h;
  }
}

function toggleA(i){
  const b=document.getElementById('ab'+i);
  const x=document.getElementById('ax'+i);
  const o=b.classList.contains('open');
  document.querySelectorAll('.acc-b').forEach(e=>e.classList.remove('open'));
  document.querySelectorAll('.acc-x').forEach(e=>e.classList.remove('open'));
  if(!o){b.classList.add('open');x.classList.add('open');}
}

R();
